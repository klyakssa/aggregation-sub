        description: MM-YYYY
      price:
        minimum: 0
        type: integer
      service_name:
        type: string
      start_date:
        allOf:
        - $ref: '#/definitions/github_com_klyakssa_aggregation-sub_internal_domain_subs.MonthYear'
        description: MM-YYYY
      user_id:
        type: string
    required:
    - price
    - service_name
    - start_date
    - user_id
    type: object
  github_com_klyakssa_aggregation-sub_internal_domain_subs.MonthYear:
    properties:
      time.Time:
        type: string
    type: object
  github_com_klyakssa_aggregation-sub_internal_domain_subs.Subscription:
    properties:
      end_date:
        type: string
      id:
        type: integer
      price:
        minimum: 0
        type: integer
      service_name:
        type: string
      start_date:
        type: string
